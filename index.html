<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Une Soirée pour Nous</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lora', serif; background-color: #fdfbfb; color: #333; scroll-behavior: smooth; }
        h1, h2, h3, .font-serif { font-family: 'Playfair Display', serif; }
        .bg-soft { background: linear-gradient(135deg, #fff5f5 0%, #fdfbfb 100%); }
        .card-content { transition: all 0.3s ease; cursor: pointer; border: 1px solid #f3f4f6; }
        .card-content:hover { transform: translateY(-3px); border-color: #e2b6b1; }
        input[type="radio"]:checked + .card-content { border-color: #7d4f50; background-color: #fffafa; ring: 1px solid #7d4f50; }
        .divider { height: 1px; background: linear-gradient(90deg, transparent, #e2b6b1, transparent); width: 60%; margin: 2rem auto; }
        .btn-submit { background-color: #7d4f50; transition: all 0.3s; }
        .btn-submit:hover { background-color: #a47778; transform: scale(1.02); }
        .link-discovery { color: #a47778; text-decoration: underline; font-size: 0.75rem; transition: color 0.2s; }
        .link-discovery:hover { color: #7d4f50; }
        .animate-fade-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media print { .no-print { display: none; } body { background: white; } }
    </style>
</head>

                "J’aurais le plaisir de vous inviter à une soirée soigneusement pensée pour nous — conçue non pas comme un programme fixe, mais comme une expérience que vous pourrez composer selon vos goûts." 
            </p>
